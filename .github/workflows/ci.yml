name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev,test]
        pip install typer rich accelerate peft bitsandbytes transformers torch

    - name: Run Tests
      run: |
        pytest tests/test_models/test_pissa.py tests/test_data/test_limits.py tests/test_models/test_loader.py tests/test_training/test_kl_controller.py tests/test_cli/test_reinforce_pp_args.py -v

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install ruff mypy types-requests types-PyYAML

    - name: Run Ruff
      run: |
        ruff check .

    - name: Run MyPy
      run: |
        mypy thinkrl --ignore-missing-imports --install-types --non-interactive
